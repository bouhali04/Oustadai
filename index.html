<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OustadAI — Assistant Scolaire Marocain</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00C896;
    --dark: #0a0a0a;
    --card: #141414;
    --border: #222;
    --text: #f0f0f0;
    --muted: #888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--dark); color: var(--text); font-family: 'Tajawal', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header { padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Space Mono', monospace; font-size: 1.2rem; color: var(--green); letter-spacing: -1px; }
  .logo span { color: var(--text); }

  /* CHAT AREA */
  .chat-wrapper { flex: 1; display: flex; flex-direction: column; max-width: 760px; width: 100%; margin: 0 auto; padding: 1.5rem 1rem; gap: 1rem; }

  .welcome { text-align: center; padding: 2rem 1rem; }
  .welcome h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 0.5rem; }
  .welcome h1 span { color: var(--green); }
  .welcome p { color: var(--muted); font-size: 1rem; line-height: 1.6; }

  .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 1.2rem; }
  .quick-btn { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: 'Tajawal', sans-serif; transition: all 0.2s; }
  .quick-btn:hover { border-color: var(--green); color: var(--green); }

  .messages { display: flex; flex-direction: column; gap: 14px; flex: 1; }

  .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: var(--card); border: 1px solid var(--border); }
  .msg.bot .msg-avatar { background: var(--green); border-color: var(--green); font-size: 14px; }

  .bubble { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.65; }
  .msg.bot .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--green); color: #000; font-weight: 500; border-bottom-right-radius: 4px; }

  .typing-dots { display: flex; gap: 5px; align-items: center; padding: 12px 14px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100%{opacity:0.3;transform:scale(1)} 30%{opacity:1;transform:scale(1.2)} }

  /* INPUT */
  .input-bar { display: flex; gap: 10px; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 8px 8px 8px 16px; transition: border-color 0.2s; }
  .input-bar:focus-within { border-color: var(--green); }
  .input-bar input { flex: 1; background: none; border: none; outline: none; font-size: 15px; color: var(--text); font-family: 'Tajawal', sans-serif; }
  .input-bar input::placeholder { color: var(--muted); }
  .send-btn { width: 38px; height: 38px; border-radius: 10px; background: var(--green); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s; }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { width: 18px; height: 18px; fill: #000; }

  .input-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* API KEY SETUP */
  .setup-banner { background: #1a1a00; border: 1px solid #444400; border-radius: 12px; padding: 1rem 1.25rem; font-size: 13px; color: #cccc00; display: none; margin-bottom: 1rem; }
  .setup-banner a { color: var(--green); }
  .api-input-row { display: flex; gap: 8px; margin-top: 8px; }
  .api-input-row input { flex: 1; background: var(--dark); border: 1px solid #444; border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--text); font-family: monospace; outline: none; }
  .api-input-row button { background: var(--green); border: none; border-radius: 8px; padding: 6px 14px; font-size: 13px; color: #000; cursor: pointer; font-weight: 700; }
</style>
</head>
<body>

<header>
  <div class="logo">Oustad<span>AI</span></div>
  <div style="font-size:12px;color:var(--muted);">مساعدك الدراسي</div>
</header>

<div class="chat-wrapper">

  <div class="setup-banner" id="setupBanner">
    ⚠️ Mochkil teknik — Colle ta clé API Gemini ici pour activer le bot :
    <div class="api-input-row">
      <input type="password" id="apiKeyInput" placeholder="AIza..." />
      <button onclick="saveKey()">Enregistrer</button>
    </div>
  </div>

  <div class="welcome" id="welcome">
    <h1>Salam ! Ana <span>OustadAI</span> 👋</h1>
    <p>Assistant scolaire pour les élèves marocains<br>بالدارجة والفرنسية — Maths, Sciences, Histoire...</p>
    <div class="quick-btns">
      <button class="quick-btn" onclick="ask('Expliquez-moi les équations du 2ème degré')">Maths — équations</button>
      <button class="quick-btn" onclick="ask('wash tqder t3awni f photosynthèse?')">Photosynthèse بالدارجة</button>
      <button class="quick-btn" onclick="ask('Aide-moi en conjugaison française')">Conjugaison française</button>
      <button class="quick-btn" onclick="ask('Chno hia revolution industrielle?')">Révolution industrielle</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div>
    <div class="input-bar">
      <input type="text" id="inp" placeholder="Kteb so2alek hna... / Écris ta question ici..." onkeydown="if(event.key==='Enter')send()" />
      <button class="send-btn" onclick="send()" aria-label="Envoyer">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-note">OustadAI — powered by Google Gemini • Gratuit pour les élèves marocains</div>
  </div>

</div>

<script>
const SYSTEM = `Tu es OustadAI, un assistant scolaire pour les élèves marocains du primaire, collège et lycée.
Tu comprends et parles en darija marocain (écriture latine : wash, 3awd, zwin, mochkil, wach fhemti, mazal, chno, bzzaf, kayn, makaynch...) ET en français ET en arabe classique.
Si l'élève écrit en darija, tu réponds d'abord en darija pour le mettre à l'aise, puis tu expliques clairement en français.
Si l'élève écrit en français, tu réponds en français avec quelques mots de darija.
Si l'élève écrit en arabe, tu réponds en arabe.
Tu aides avec : maths, sciences, histoire-géo, français, arabe, physique, chimie, SVT.
Tu donnes des explications simples avec des exemples concrets du quotidien marocain (souks, médinas, atlas, etc).
Tu es encourageant, patient et positif. Tu utilises des étapes numérotées quand tu expliques.
Réponds en maximum 200 mots. Sois clair, chaleureux et pédagogique.`;

let history = [];
let API_KEY = localStorage.getItem('gemini_key') || 'AIzaSy...ta clé ici...';
function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if(k) { API_KEY = k; localStorage.setItem('gemini_key', k); document.getElementById('setupBanner').style.display = 'none'; addMsg('Zwin ! Daba OustadAI khdam. Kteb so2alek!', 'bot'); }
}

function getTime() { return new Date().toLocaleTimeString('fr-MA',{hour:'2-digit',minute:'2-digit'}); }

function addMsg(text, role) {
  document.getElementById('welcome').style.display = 'none';
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  const avatar = role === 'bot' ? '🎓' : '🧑';
  d.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot'; d.id = 'typing';
  d.innerHTML = `<div class="msg-avatar">🎓</div><div class="bubble"><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

async function send() {
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if(!text) return;
  if(!API_KEY) { document.getElementById('setupBanner').style.display = 'block'; return; }
  inp.value = '';
  addMsg(text, 'user');
  history.push({role:'user', parts:[{text}]});
  showTyping();
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        system_instruction: {parts:[{text: SYSTEM}]},
        contents: history
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    removeTyping();
    history.push({role:'model', parts:[{text: reply}]});
    addMsg(reply, 'bot');
  } catch(e) {
    removeTyping();
    document.getElementById('setupBanner').style.display = 'block';
    addMsg('Mochkil f connexion — vérifiez votre clé API.', 'bot');
  }
}

function ask(text) { document.getElementById('inp').value = text; send(); }

if(!API_KEY) document.getElementById('setupBanner').style.display = 'block';
</script>
</body>
</html>
